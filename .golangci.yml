version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - depguard
    - errcheck
    - errorlint
    - forbidigo
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "log$"
              desc: "Use log/slog instead of the standard log package"
    forbidigo:
      forbid:
        - pattern: "^fmt\\.Print(f|ln)?$"
          msg: "Use slog or structured logging instead of fmt.Print*"
    gosec:
      excludes:
        - G115
    revive:
      rules:
        - name: early-return
        - name: var-naming

  exclusions:
    rules:
      # Generated code — skip heavy linting
      - path: "internal/repository/sqlite/sqlc/"
        linters:
          - revive
          - errcheck
      # Test files — skip errcheck (cleanup lambdas use _ intentionally)
      - path: "_test\\.go"
        linters:
          - errcheck
      # CLI entry points use fmt.Print* for user-facing output
      - path: "cmd/"
        linters:
          - forbidigo
