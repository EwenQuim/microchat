name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Download Go dependencies
        run: go mod download

      - name: Verify Go dependencies
        run: go mod verify

      - name: Build server
        run: make build-server

      - name: Build CLI
        run: make build-microchat

      # install-mode: goinstall builds golangci-lint from source with this job's Go
      # toolchain. Prebuilt binaries are compiled with go1.25, which refuses to lint a
      # module targeting go1.26 ("language version used to build golangci-lint is lower
      # than the targeted Go version"); building with go1.26 also gives analyzers that
      # understand the go1.26 new(value) builtin.
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-mode: goinstall

      - name: Run tests
        run: make test

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        run: cd app && npm ci

      - name: Lint
        run: cd app && npm run lint

      - name: Typecheck
        run: cd app && npm run typecheck

      - name: Build frontend
        run: cd app && npm run build
