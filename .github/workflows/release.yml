name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Compute SHA256 of source tarball
        id: sha
        run: |
          TAG=${{ github.ref_name }}
          URL="https://github.com/EwenQuim/microchat/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Clone homebrew-repo
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/EwenQuim/homebrew-repo.git homebrew-repo

      - name: Update microchat formula
        run: |
          TAG=${{ steps.sha.outputs.tag }}
          SHA=${{ steps.sha.outputs.sha256 }}
          URL=${{ steps.sha.outputs.url }}
          sed -i "s|url \".*\"|url \"${URL}\"|" homebrew-repo/Formula/microchat.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" homebrew-repo/Formula/microchat.rb

      - name: Update microchat-server formula
        run: |
          TAG=${{ steps.sha.outputs.tag }}
          SHA=${{ steps.sha.outputs.sha256 }}
          URL=${{ steps.sha.outputs.url }}
          sed -i "s|url \".*\"|url \"${URL}\"|" homebrew-repo/Formula/microchat-server.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" homebrew-repo/Formula/microchat-server.rb

      - name: Commit and push homebrew-repo
        run: |
          TAG=${{ steps.sha.outputs.tag }}
          cd homebrew-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/microchat.rb Formula/microchat-server.rb
          git commit -m "Update microchat formulas to ${TAG}"
          git push origin main
